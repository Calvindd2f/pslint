name: PSCI
permissions:
  contents: read
  packages: write
  security-events: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  codeql:
    name: CodeQL C#
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: csharp

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Run Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v14
        with:
          config: .github/workflows/.markdownlint.yaml
          globs: "**/*.md"

  build-and-publish:
    name: Build and Publish
    needs: [codeql, markdownlint]
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: PowerShell Module Cache
        id: _c232508244db4fd897e4b9e04710cc76
        uses: potatoqualitee/psmodulecache@v6.2
        with:
          modules-to-cache: PSScriptAnalyzer, Pester

      - name: Build PowerShell Module
        shell: pwsh
        run: ./build.ps1

      - name: Run pslint self-check
        shell: pwsh
        run: |
          Import-Module ./dist/pslint/pslint.psd1
          pslint -ScriptBlock { Write-Host "CI test" }

      - name: Run PSScriptAnalyzer
        id: _e0a3d4e558104409b61a28bba331e88a
        uses: microsoft/psscriptanalyzer-action@v1.1
        with:
          recurse: $true
          customRulePath: .github/workflows/PSScriptAnalyzerSettings.psd1

      - name: Publish PowerShell Module to PowerShellGallery
        id: _38ad555c65014b818d792b3b7abd1b2b
        uses: mod-posh/PublishPowerShellModule@v0.0.1.0
        with:
          ModuleName: 'pslint'
          Output: 'dist/pslint'
          ApiKey: ${{ secrets.NUGETAPIKEY }}
          Debug: 'true'
